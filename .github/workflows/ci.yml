name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: apatris
          POSTGRES_PASSWORD: apatris_test
          POSTGRES_DB: apatris_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://apatris:apatris_test@localhost:5432/apatris_test
      JWT_SECRET: test-jwt-secret-for-ci
      PORT: 8080
      BASE_PATH: /workforce/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (libs)
        run: pnpm run typecheck:libs
        continue-on-error: true

      - name: Build API server
        run: pnpm --filter @workspace/api-server build

      - name: Run API tests
        run: pnpm --filter @workspace/api-server test
        continue-on-error: true

      - name: Build workforce app
        run: pnpm --filter @workspace/workforce-app build

      - name: Build dashboard
        run: pnpm --filter @workspace/apatris-dashboard build
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- API server: built" >> $GITHUB_STEP_SUMMARY
          echo "- Workforce app: built" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline complete" >> $GITHUB_STEP_SUMMARY
