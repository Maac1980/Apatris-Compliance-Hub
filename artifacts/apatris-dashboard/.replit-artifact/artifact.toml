kind = "web"
previewPath = "/"
title = "Apatris Compliance Dashboard"
version = "1.0.0"
id = "artifacts/apatris-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20094
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/apatris-dashboard run dev"

[services.env]
PORT = "20094"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/apatris-dashboard", "run", "build"]
publicDir = "artifacts/apatris-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
